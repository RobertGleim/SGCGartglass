name: Security Audit Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks CLI
        run: |
          set -euo pipefail
          VERSION="8.28.0"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            gitleaks git --redact --exit-code 1 --log-opts="--no-merges --first-parent ${{ github.event.before }}..${{ github.sha }}"
          else
            gitleaks git --redact --exit-code 1
          fi

  npm-audit-frontend:
    name: Frontend npm audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Audit frontend production dependencies
        run: |
          cd frontend
          npm audit --omit=dev --audit-level=high

  pip-audit-backend:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit root requirements
        continue-on-error: true
        run: pip-audit -r requirements.txt -f json -o pip-audit-root.json

      - name: Audit backend requirements
        continue-on-error: true
        run: pip-audit -r backend/requirements.txt -f json -o pip-audit-backend.json

      - name: Summarize Python dependency audit
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          files = [
              ("requirements.txt", Path("pip-audit-root.json")),
              ("backend/requirements.txt", Path("pip-audit-backend.json")),
          ]

          print("Python dependency audit summary:")
          total = 0
          for label, file_path in files:
              if not file_path.exists():
                  print(f"- {label}: report missing ({file_path})")
                  continue

              try:
                  payload = json.loads(file_path.read_text(encoding="utf-8"))
              except Exception:
                  print(f"- {label}: unable to parse {file_path}")
                  continue

              deps = payload.get("dependencies", []) if isinstance(payload, dict) else []
              findings = sum(len(dep.get("vulns", []) or []) for dep in deps if isinstance(dep, dict))
              total += findings
              print(f"- {label}: {findings} vulnerability finding(s)")

          print(f"Total findings: {total}")
          PY
