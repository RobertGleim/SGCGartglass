name: Deploy Frontend and Backend

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'requirements.txt'
      - 'render.yaml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/deploy.yml'
            backend:
              - 'backend/**'
              - 'requirements.txt'
              - 'render.yaml'
              - '.github/workflows/deploy.yml'

  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_API_BASE_URL: https://sgcgartglass.onrender.com/api

      - name: Validate Hostinger SSH secrets
        env:
          HOSTINGER_REMOTE_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          HOSTINGER_SSH_PASSWORD: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          normalize_host() {
            local h="$1"
            h="${h#ssh://}"
            h="${h#sftp://}"
            h="${h#ftp://}"
            h="${h#ftps://}"
            h="${h##*@}"
            h="${h%%/*}"
            printf '%s' "$h" | tr -d '\r[:space:]'
          }

          extract_port() {
            local h="$1"
            if printf '%s' "$h" | grep -Eq ':[0-9]+$'; then
              printf '%s' "${h##*:}"
            else
              printf '%s' ""
            fi
          }

          extract_host_only() {
            local h="$1"
            if printf '%s' "$h" | grep -Eq ':[0-9]+$'; then
              printf '%s' "${h%:*}"
            else
              printf '%s' "$h"
            fi
          }

          is_placeholder_host() {
            local h="$1"
            local lower
            lower="$(printf '%s' "$h" | tr '[:upper:]' '[:lower:]')"
            if [ -z "$h" ]; then return 0; fi
            if printf '%s' "$h" | grep -Eq '^\*+$'; then return 0; fi
            case "$lower" in
              "<hidden>"|"redacted"|"changeme"|"change_me") return 0 ;;
              *) return 1 ;;
            esac
          }

          is_ip_literal() {
            local h="$1"
            # Accept IPv4 literals and bracketed/non-bracketed IPv6 literals.
            if printf '%s' "$h" | grep -Eq '^([0-9]{1,3}\.){3}[0-9]{1,3}$'; then return 0; fi
            if printf '%s' "$h" | grep -Eq '^\[[0-9A-Fa-f:]+\]$'; then return 0; fi
            if printf '%s' "$h" | grep -Eq '^[0-9A-Fa-f:]+$' && printf '%s' "$h" | grep -q ':'; then return 0; fi
            return 1
          }

          test -n "$HOSTINGER_REMOTE_PATH" || (echo "Missing secret: HOSTINGER_REMOTE_PATH" && exit 1)
          test -n "$HOSTINGER_SSH_HOST" || (echo "Missing secret: HOSTINGER_SSH_HOST" && exit 1)
          test -n "$HOSTINGER_SSH_USER" || (echo "Missing secret: HOSTINGER_SSH_USER" && exit 1)
          test -n "$(echo "${HOSTINGER_SSH_PORT:-65002}" | tr -d '[:space:]')" || (echo "Missing/invalid HOSTINGER_SSH_PORT" && exit 1)

          SSH_HOST_RAW="$(normalize_host "$HOSTINGER_SSH_HOST")"
          SSH_HOST_NORMALIZED="$(extract_host_only "$SSH_HOST_RAW")"
          test -n "$SSH_HOST_NORMALIZED" || (echo "HOSTINGER_SSH_HOST is invalid after normalization" && exit 1)
          if is_placeholder_host "$SSH_HOST_NORMALIZED"; then
            echo "HOSTINGER_SSH_HOST appears to be a placeholder value."
            exit 1
          fi

          if ! is_ip_literal "$SSH_HOST_NORMALIZED" && ! getent hosts "$SSH_HOST_NORMALIZED" >/dev/null 2>&1; then
            echo "Warning: DNS lookup failed for HOSTINGER_SSH_HOST '$SSH_HOST_NORMALIZED' during precheck."
            echo "Continuing so SSH deploy can run and FTP fallback can attempt if configured."
            echo "If SSH step also fails DNS, set HOSTINGER_SSH_HOST to a resolvable host only (no protocol, username, or path)."
          fi

          if [ -z "$HOSTINGER_SSH_PRIVATE_KEY" ] && [ -z "$HOSTINGER_SSH_PASSWORD" ]; then
            echo "Provide either HOSTINGER_SSH_PRIVATE_KEY or HOSTINGER_SSH_PASSWORD/FTP_PASSWORD"
            exit 1
          fi

          # Validate FTP fallback only when configured.
          FTP_HOST_NORMALIZED="$(normalize_host "$FTP_HOST")"
          if [ -z "$FTP_HOST" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "FTP fallback is not fully configured (FTP_HOST/FTP_USERNAME/FTP_PASSWORD)."
            echo "SSH deploy can still succeed; configure FTP secrets only if fallback is required."
          elif is_placeholder_host "$FTP_HOST_NORMALIZED"; then
            echo "Warning: FTP_HOST appears to be a placeholder; fallback will reuse HOSTINGER_SSH_HOST."
          fi

      - name: Deploy to Hostinger via SSH (SFTP)
        id: ssh_deploy
        continue-on-error: true
        env:
          HOSTINGER_REMOTE_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          HOSTINGER_SSH_PASSWORD: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp openssh-client

          normalize_host() {
            local h="$1"
            h="${h#ssh://}"
            h="${h#sftp://}"
            h="${h#ftp://}"
            h="${h#ftps://}"
            h="${h##*@}"
            h="${h%%/*}"
            printf '%s' "$h" | tr -d '\r[:space:]'
          }

          extract_port() {
            local h="$1"
            if printf '%s' "$h" | grep -Eq ':[0-9]+$'; then
              printf '%s' "${h##*:}"
            else
              printf '%s' ""
            fi
          }

          extract_host_only() {
            local h="$1"
            if printf '%s' "$h" | grep -Eq ':[0-9]+$'; then
              printf '%s' "${h%:*}"
            else
              printf '%s' "$h"
            fi
          }

          HOST_RAW="$(normalize_host "$HOSTINGER_SSH_HOST")"
          HOST="$(extract_host_only "$HOST_RAW")"
          HOST_PORT_FROM_HOST="$(extract_port "$HOST_RAW")"
          test -n "$HOST" || (echo "Normalized HOSTINGER_SSH_HOST is empty" && exit 1)
          is_placeholder_host() {
            local h="$1"
            local lower
            lower="$(printf '%s' "$h" | tr '[:upper:]' '[:lower:]')"
            if [ -z "$h" ]; then return 0; fi
            if printf '%s' "$h" | grep -Eq '^\*+$'; then return 0; fi
            case "$lower" in
              "<hidden>"|"redacted"|"changeme"|"change_me") return 0 ;;
              *) return 1 ;;
            esac
          }

          is_ip_literal() {
            local h="$1"
            if printf '%s' "$h" | grep -Eq '^([0-9]{1,3}\.){3}[0-9]{1,3}$'; then return 0; fi
            if printf '%s' "$h" | grep -Eq '^\[[0-9A-Fa-f:]+\]$'; then return 0; fi
            if printf '%s' "$h" | grep -Eq '^[0-9A-Fa-f:]+$' && printf '%s' "$h" | grep -q ':'; then return 0; fi
            return 1
          }
          if is_placeholder_host "$HOST"; then
            echo "HOSTINGER_SSH_HOST appears to be a placeholder value."
            exit 1
          fi
          USERNAME="$HOSTINGER_SSH_USER"
          PORT="$(echo "${HOSTINGER_SSH_PORT:-$HOST_PORT_FROM_HOST}" | tr -d '[:space:]')"
          PORT="${PORT:-65002}"
          PASSWORD="$(printf '%s' "$HOSTINGER_SSH_PASSWORD" | tr -d '\r')"

          if ! is_ip_literal "$HOST" && ! getent hosts "$HOST" >/dev/null 2>&1; then
            echo "DNS lookup failed for HOSTINGER_SSH_HOST '$HOST'."
            echo "Set HOSTINGER_SSH_HOST to a resolvable host only (no protocol, username, or path)."
            exit 1
          fi

          run_lftp_key_auth() {
            lftp -d -u "$USERNAME" "sftp://$HOST:$PORT" -e "
              set net:timeout 30;
              set net:max-retries 2;
              set net:reconnect-interval-base 5;
              set cmd:fail-exit yes;
              set cmd:interactive no;
              set sftp:auto-confirm yes;
              pwd;
              mirror --reverse --delete --verbose --parallel=4 dist/ \"$HOSTINGER_REMOTE_PATH\";
              bye
            "
          }

          run_lftp_password_auth() {
            lftp -d -u "$USERNAME","$PASSWORD" "sftp://$HOST:$PORT" -e "
              set net:timeout 30;
              set net:max-retries 2;
              set net:reconnect-interval-base 5;
              set cmd:fail-exit yes;
              set cmd:interactive no;
              set sftp:auto-confirm yes;
              pwd;
              mirror --reverse --delete --verbose --parallel=4 dist/ \"$HOSTINGER_REMOTE_PATH\";
              bye
            "
          }

          if [ -n "$HOSTINGER_SSH_PRIVATE_KEY" ]; then
            umask 077
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            KEY_CONTENT="$(printf '%s' "$HOSTINGER_SSH_PRIVATE_KEY" | tr -d '\r')"

            # Support both raw multiline PEM and escaped/newline or base64-encoded secrets.
            if printf '%s' "$KEY_CONTENT" | grep -q "BEGIN .*PRIVATE KEY"; then
              printf '%b\n' "$KEY_CONTENT" > ~/.ssh/id_rsa
            else
              if ! printf '%s' "$KEY_CONTENT" | base64 --decode > ~/.ssh/id_rsa 2>/dev/null; then
                echo "HOSTINGER_SSH_PRIVATE_KEY is neither PEM text nor valid base64."
                rm -f ~/.ssh/id_rsa
              fi
            fi

            KEY_READY=false
            if [ -s ~/.ssh/id_rsa ]; then
              chmod 600 ~/.ssh/id_rsa
            fi
            if [ -s ~/.ssh/id_rsa ] && ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null 2>&1; then
              eval "$(ssh-agent -s)"
              if ssh-add ~/.ssh/id_rsa >/dev/null 2>&1; then
                KEY_READY=true
              else
                echo "Private key could not be loaded; trying password auth next."
              fi
            else
              echo "Private key format is invalid; trying password auth next."
            fi

            if [ "$KEY_READY" = true ] && run_lftp_key_auth; then
              echo "SFTP deploy succeeded with private key."
            elif [ -n "$PASSWORD" ]; then
              echo "Key auth failed; retrying SFTP deploy with password..."
              run_lftp_password_auth
            else
              echo "Key auth failed and HOSTINGER_SSH_PASSWORD is not set."
              exit 1
            fi
          else
            run_lftp_password_auth
          fi

      - name: Fallback - Deploy via FTP (lftp)
        if: steps.ssh_deploy.outcome == 'failure'
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          HOSTINGER_SSH_PASSWORD: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          HOSTINGER_REMOTE_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
        run: |
          sudo apt-get install -y lftp

          normalize_host() {
            local h="$1"
            h="${h#ssh://}"
            h="${h#sftp://}"
            h="${h#ftp://}"
            h="${h#ftps://}"
            h="${h##*@}"
            h="${h%%/*}"
            printf '%s' "$h" | tr -d '\r[:space:]'
          }

          detect_scheme() {
            local raw
            raw="$(printf '%s' "$1" | tr -d '\r[:space:]')"
            case "$raw" in
              ftps://*) printf 'ftps' ;;
              ftp://*) printf 'ftp' ;;
              *) printf 'ftp' ;;
            esac
          }

          extract_port() {
            local h="$1"
            # Supports host:port after normalization.
            if printf '%s' "$h" | grep -Eq ':[0-9]+$'; then
              printf '%s' "${h##*:}"
            else
              printf '%s' "21"
            fi
          }

          extract_host_only() {
            local h="$1"
            if printf '%s' "$h" | grep -Eq ':[0-9]+$'; then
              printf '%s' "${h%:*}"
            else
              printf '%s' "$h"
            fi
          }

          is_placeholder_host() {
            local h="$1"
            local lower
            lower="$(printf '%s' "$h" | tr '[:upper:]' '[:lower:]')"
            if [ -z "$h" ]; then return 0; fi
            if printf '%s' "$h" | grep -Eq '^\*+$'; then return 0; fi
            case "$lower" in
              "<hidden>"|"redacted"|"changeme"|"change_me") return 0 ;;
              *) return 1 ;;
            esac
          }

          is_ip_literal() {
            local h="$1"
            if printf '%s' "$h" | grep -Eq '^([0-9]{1,3}\.){3}[0-9]{1,3}$'; then return 0; fi
            if printf '%s' "$h" | grep -Eq '^\[[0-9A-Fa-f:]+\]$'; then return 0; fi
            if printf '%s' "$h" | grep -Eq '^[0-9A-Fa-f:]+$' && printf '%s' "$h" | grep -q ':'; then return 0; fi
            return 1
          }

          FTP_SCHEME="$(detect_scheme "$FTP_HOST")"
          FTP_HOST_NORMALIZED="$(normalize_host "$FTP_HOST")"
          SSH_HOST_NORMALIZED="$(normalize_host "$HOSTINGER_SSH_HOST")"

          HOST="$FTP_HOST_NORMALIZED"
          if [ -z "$HOST" ] || is_placeholder_host "$HOST"; then
            HOST="$SSH_HOST_NORMALIZED"
          fi

          USERNAME="$FTP_USERNAME"
          PASSWORD="$FTP_PASSWORD"
          if [ -z "$USERNAME" ]; then USERNAME="$HOSTINGER_SSH_USER"; fi
          if [ -z "$PASSWORD" ]; then PASSWORD="$HOSTINGER_SSH_PASSWORD"; fi

          test -n "$USERNAME" || (echo "FTP username is missing (set FTP_USERNAME or HOSTINGER_SSH_USER)." && exit 1)
          test -n "$PASSWORD" || (echo "FTP password is missing (set FTP_PASSWORD or HOSTINGER_SSH_PASSWORD)." && exit 1)

          test -n "$HOST" || (echo "Normalized FTP_HOST is empty" && exit 1)
          if is_placeholder_host "$HOST"; then
            echo "FTP host appears to be a placeholder value; check FTP_HOST/HOSTINGER_SSH_HOST secrets."
            exit 1
          fi

          PORT="$(extract_port "$HOST")"
          HOST_ONLY="$(extract_host_only "$HOST")"
          SSH_HOST_ONLY="$(extract_host_only "$SSH_HOST_NORMALIZED")"
          SSH_PORT="$(extract_port "$SSH_HOST_NORMALIZED")"
          if [ -z "$SSH_PORT" ]; then SSH_PORT="$(echo "${HOSTINGER_SSH_PORT:-21}" | tr -d '[:space:]')"; fi
          if [ -z "$SSH_PORT" ]; then SSH_PORT="21"; fi
          test -n "$HOST_ONLY" || (echo "FTP host became empty after host/port parsing" && exit 1)
          test -n "$PORT" || (echo "FTP port parsing failed" && exit 1)

          if ! is_ip_literal "$HOST_ONLY" && ! getent hosts "$HOST_ONLY" >/dev/null 2>&1; then
            echo "DNS lookup failed for FTP host '$HOST_ONLY'."
            if [ -n "$SSH_HOST_ONLY" ] && ! is_placeholder_host "$SSH_HOST_ONLY" && (is_ip_literal "$SSH_HOST_ONLY" || getent hosts "$SSH_HOST_ONLY" >/dev/null 2>&1); then
              echo "Falling back to HOSTINGER_SSH_HOST '$SSH_HOST_ONLY' for FTP host."
              HOST_ONLY="$SSH_HOST_ONLY"
              PORT="$SSH_PORT"
            else
              echo "Check FTP_HOST secret value (host only, no typos, no path), or set a valid resolvable domain/IP."
              exit 1
            fi
          fi

          if ! timeout 8 bash -c "</dev/tcp/$HOST_ONLY/$PORT" 2>/dev/null; then
            echo "Warning: TCP precheck failed for $HOST_ONLY:$PORT."
            echo "Continuing with lftp attempts (protocol/port fallback may still succeed)."
          fi

          echo "SSH deploy failed, falling back to FTP..."
          run_ftp_mirror() {
            local scheme="$1"
            local port="$2"
            local ssl_force="no"
            if [ "$scheme" = "ftps" ]; then
              ssl_force="yes"
            fi

            echo "Attempting ${scheme^^} deploy to $HOST_ONLY:$port"
            lftp -d -u "$USERNAME","$PASSWORD" "${scheme}://$HOST_ONLY:$port" -e "
              set ssl:verify-certificate no;
              set ftp:ssl-allow yes;
              set ftp:ssl-force $ssl_force;
              set net:timeout 30;
              set net:max-retries 2;
              set net:reconnect-interval-base 5;
              set cmd:fail-exit yes;
              set cmd:interactive no;
              pwd;
              mirror --reverse --delete --verbose --parallel=4 dist/ \"$HOSTINGER_REMOTE_PATH\";
              bye
            "
          }

          PORT_ALT=""
          if [ "$PORT" = "21" ]; then
            PORT_ALT="990"
          elif [ "$PORT" = "990" ]; then
            PORT_ALT="21"
          fi

          if run_ftp_mirror "$FTP_SCHEME" "$PORT"; then
            echo "FTP fallback deploy succeeded using scheme '$FTP_SCHEME' on port '$PORT'."
          elif [ -n "$PORT_ALT" ] && run_ftp_mirror "$FTP_SCHEME" "$PORT_ALT"; then
            echo "FTP fallback deploy succeeded using scheme '$FTP_SCHEME' on alternate port '$PORT_ALT'."
          elif [ "$FTP_SCHEME" = "ftp" ]; then
            echo "FTP attempts failed; retrying with FTPS..."
            if run_ftp_mirror "ftps" "$PORT"; then
              echo "FTP fallback deploy succeeded using scheme 'ftps' on port '$PORT'."
            elif [ -n "$PORT_ALT" ]; then
              run_ftp_mirror "ftps" "$PORT_ALT"
            else
              run_ftp_mirror "ftps" "990"
            fi
          else
            echo "FTPS attempts failed; retrying with FTP..."
            if run_ftp_mirror "ftp" "$PORT"; then
              echo "FTP fallback deploy succeeded using scheme 'ftp' on port '$PORT'."
            elif [ -n "$PORT_ALT" ]; then
              run_ftp_mirror "ftp" "$PORT_ALT"
            else
              run_ftp_mirror "ftp" "21"
            fi
          fi

      - name: Frontend smoke test
        env:
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        run: |
          TARGET_URL="${FRONTEND_URL:-https://sgcgart.com/}"
          echo "Smoke testing $TARGET_URL"
          curl --fail --silent --show-error "$TARGET_URL" >/dev/null

  deploy-backend-render:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    timeout-minutes: 20

    steps:
      - name: Validate Render deploy hook secret
        env:
          RENDER_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
        run: |
          test -n "$RENDER_BACKEND_DEPLOY_HOOK_URL" || (echo "Missing secret: RENDER_BACKEND_DEPLOY_HOOK_URL" && exit 1)

      - name: Trigger Render backend deploy hook
        run: |
          curl --fail --show-error --silent -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}"

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl --fail --silent --show-error "https://sgcgartglass.onrender.com/api/health" >/dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Waiting for backend health... attempt $i/30"
            sleep 10
          done
          echo "Backend health check failed"
          exit 1
