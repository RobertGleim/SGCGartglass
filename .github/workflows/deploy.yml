name: Deploy Frontend and Backend

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'requirements.txt'
      - 'render.yaml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/deploy.yml'
            backend:
              - 'backend/**'
              - 'requirements.txt'
              - 'render.yaml'
              - '.github/workflows/deploy.yml'

  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_API_BASE_URL: https://sgcgartglass.onrender.com/api

      - name: Validate Hostinger SSH secrets
        env:
          HOSTINGER_REMOTE_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          HOSTINGER_SSH_PASSWORD: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          normalize_host() {
            local h="$1"
            h="${h#ssh://}"
            h="${h#sftp://}"
            h="${h#ftp://}"
            h="${h#ftps://}"
            h="${h##*@}"
            h="${h%%/*}"
            printf '%s' "$h" | tr -d '\r[:space:]'
          }

          is_placeholder_host() {
            local h="$1"
            local lower
            lower="$(printf '%s' "$h" | tr '[:upper:]' '[:lower:]')"
            if [ -z "$h" ]; then return 0; fi
            if printf '%s' "$h" | grep -Eq '^\*+$'; then return 0; fi
            case "$lower" in
              "<hidden>"|"redacted"|"changeme"|"change_me") return 0 ;;
              *) return 1 ;;
            esac
          }

          test -n "$HOSTINGER_REMOTE_PATH" || (echo "Missing secret: HOSTINGER_REMOTE_PATH" && exit 1)
          test -n "$HOSTINGER_SSH_HOST" || (echo "Missing secret: HOSTINGER_SSH_HOST" && exit 1)
          test -n "$HOSTINGER_SSH_USER" || (echo "Missing secret: HOSTINGER_SSH_USER" && exit 1)
          test -n "$(echo "${HOSTINGER_SSH_PORT:-65002}" | tr -d '[:space:]')" || (echo "Missing/invalid HOSTINGER_SSH_PORT" && exit 1)

          SSH_HOST_NORMALIZED="$(normalize_host "$HOSTINGER_SSH_HOST")"
          test -n "$SSH_HOST_NORMALIZED" || (echo "HOSTINGER_SSH_HOST is invalid after normalization" && exit 1)
          if is_placeholder_host "$SSH_HOST_NORMALIZED"; then
            echo "HOSTINGER_SSH_HOST appears to be a placeholder value."
            exit 1
          fi

          if [ -z "$HOSTINGER_SSH_PRIVATE_KEY" ] && [ -z "$HOSTINGER_SSH_PASSWORD" ]; then
            echo "Provide either HOSTINGER_SSH_PRIVATE_KEY or HOSTINGER_SSH_PASSWORD/FTP_PASSWORD"
            exit 1
          fi

          # Ensure FTP fallback remains usable.
          test -n "$FTP_HOST" || (echo "Missing secret: FTP_HOST" && exit 1)
          test -n "$FTP_USERNAME" || (echo "Missing secret: FTP_USERNAME" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "Missing secret: FTP_PASSWORD" && exit 1)

          FTP_HOST_NORMALIZED="$(normalize_host "$FTP_HOST")"
          if is_placeholder_host "$FTP_HOST_NORMALIZED"; then
            echo "Warning: FTP_HOST appears to be a placeholder; fallback will reuse HOSTINGER_SSH_HOST."
          fi

      - name: Deploy to Hostinger via SSH (SFTP)
        id: ssh_deploy
        continue-on-error: true
        env:
          HOSTINGER_REMOTE_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          HOSTINGER_SSH_PASSWORD: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp openssh-client

          HOST="$HOSTINGER_SSH_HOST"
          HOST="${HOST#ssh://}"
          HOST="${HOST#sftp://}"
          HOST="${HOST#ftp://}"
          HOST="${HOST#ftps://}"
          HOST="${HOST##*@}"
          HOST="${HOST%%/*}"
          HOST="$(printf '%s' "$HOST" | tr -d '\r[:space:]')"
          test -n "$HOST" || (echo "Normalized HOSTINGER_SSH_HOST is empty" && exit 1)
          is_placeholder_host() {
            local h="$1"
            local lower
            lower="$(printf '%s' "$h" | tr '[:upper:]' '[:lower:]')"
            if [ -z "$h" ]; then return 0; fi
            if printf '%s' "$h" | grep -Eq '^\*+$'; then return 0; fi
            case "$lower" in
              "<hidden>"|"redacted"|"changeme"|"change_me") return 0 ;;
              *) return 1 ;;
            esac
          }
          if is_placeholder_host "$HOST"; then
            echo "HOSTINGER_SSH_HOST appears to be a placeholder value."
            exit 1
          fi
          USERNAME="$HOSTINGER_SSH_USER"
          PORT="$(echo "${HOSTINGER_SSH_PORT:-65002}" | tr -d '[:space:]')"
          PASSWORD="$(printf '%s' "$HOSTINGER_SSH_PASSWORD" | tr -d '\r')"

          run_lftp_key_auth() {
            lftp -u "$USERNAME" "sftp://$HOST:$PORT" -e "
              set net:timeout 30;
              set net:max-retries 1;
              set cmd:fail-exit yes;
              set cmd:interactive no;
              set sftp:auto-confirm yes;
              mirror --reverse --delete --verbose --parallel=4 dist/ \"$HOSTINGER_REMOTE_PATH\";
              bye
            "
          }

          run_lftp_password_auth() {
            lftp -u "$USERNAME","$PASSWORD" "sftp://$HOST:$PORT" -e "
              set net:timeout 30;
              set net:max-retries 1;
              set cmd:fail-exit yes;
              set cmd:interactive no;
              set sftp:auto-confirm yes;
              mirror --reverse --delete --verbose --parallel=4 dist/ \"$HOSTINGER_REMOTE_PATH\";
              bye
            "
          }

          if [ -n "$HOSTINGER_SSH_PRIVATE_KEY" ]; then
            umask 077
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            KEY_CONTENT="$(printf '%s' "$HOSTINGER_SSH_PRIVATE_KEY" | tr -d '\r')"

            # Support both raw multiline PEM and escaped/newline or base64-encoded secrets.
            if printf '%s' "$KEY_CONTENT" | grep -q "BEGIN .*PRIVATE KEY"; then
              printf '%b\n' "$KEY_CONTENT" > ~/.ssh/id_rsa
            else
              if ! printf '%s' "$KEY_CONTENT" | base64 --decode > ~/.ssh/id_rsa 2>/dev/null; then
                echo "HOSTINGER_SSH_PRIVATE_KEY is neither PEM text nor valid base64."
                rm -f ~/.ssh/id_rsa
              fi
            fi

            KEY_READY=false
            if [ -s ~/.ssh/id_rsa ]; then
              chmod 600 ~/.ssh/id_rsa
            fi
            if [ -s ~/.ssh/id_rsa ] && ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null 2>&1; then
              eval "$(ssh-agent -s)"
              if ssh-add ~/.ssh/id_rsa >/dev/null 2>&1; then
                KEY_READY=true
              else
                echo "Private key could not be loaded; trying password auth next."
              fi
            else
              echo "Private key format is invalid; trying password auth next."
            fi

            if [ "$KEY_READY" = true ] && run_lftp_key_auth; then
              echo "SFTP deploy succeeded with private key."
            elif [ -n "$PASSWORD" ]; then
              echo "Key auth failed; retrying SFTP deploy with password..."
              run_lftp_password_auth
            else
              echo "Key auth failed and HOSTINGER_SSH_PASSWORD is not set."
              exit 1
            fi
          else
            run_lftp_password_auth
          fi

      - name: Fallback - Deploy via FTP (lftp)
        if: steps.ssh_deploy.outcome == 'failure'
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          HOSTINGER_REMOTE_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
        run: |
          sudo apt-get install -y lftp

          normalize_host() {
            local h="$1"
            h="${h#ssh://}"
            h="${h#sftp://}"
            h="${h#ftp://}"
            h="${h#ftps://}"
            h="${h##*@}"
            h="${h%%/*}"
            printf '%s' "$h" | tr -d '\r[:space:]'
          }

          is_placeholder_host() {
            local h="$1"
            local lower
            lower="$(printf '%s' "$h" | tr '[:upper:]' '[:lower:]')"
            if [ -z "$h" ]; then return 0; fi
            if printf '%s' "$h" | grep -Eq '^\*+$'; then return 0; fi
            case "$lower" in
              "<hidden>"|"redacted"|"changeme"|"change_me") return 0 ;;
              *) return 1 ;;
            esac
          }

          FTP_HOST_NORMALIZED="$(normalize_host "$FTP_HOST")"
          SSH_HOST_NORMALIZED="$(normalize_host "$HOSTINGER_SSH_HOST")"

          HOST="$FTP_HOST_NORMALIZED"
          if is_placeholder_host "$HOST"; then
            HOST="$SSH_HOST_NORMALIZED"
          fi

          test -n "$HOST" || (echo "Normalized FTP_HOST is empty" && exit 1)
          if is_placeholder_host "$HOST"; then
            echo "FTP host appears to be a placeholder value; check FTP_HOST/HOSTINGER_SSH_HOST secrets."
            exit 1
          fi

          echo "SSH deploy failed, falling back to FTP..."
          lftp -e "
            set ssl:verify-certificate no;
            set ftp:ssl-allow yes;
            set ftp:ssl-force no;
            set net:timeout 30;
            set net:max-retries 1;
            set cmd:fail-exit yes;
            set cmd:interactive no;
            open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" \"$HOST\";
            mirror --reverse --delete --verbose --parallel=4 dist/ \"$HOSTINGER_REMOTE_PATH\";
            bye
          "

      - name: Frontend smoke test
        env:
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        run: |
          TARGET_URL="${FRONTEND_URL:-https://sgcgart.com/}"
          echo "Smoke testing $TARGET_URL"
          curl --fail --silent --show-error "$TARGET_URL" >/dev/null

  deploy-backend-render:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    timeout-minutes: 20

    steps:
      - name: Validate Render deploy hook secret
        env:
          RENDER_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
        run: |
          test -n "$RENDER_BACKEND_DEPLOY_HOOK_URL" || (echo "Missing secret: RENDER_BACKEND_DEPLOY_HOOK_URL" && exit 1)

      - name: Trigger Render backend deploy hook
        run: |
          curl --fail --show-error --silent -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}"

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl --fail --silent --show-error "https://sgcgartglass.onrender.com/api/health" >/dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Waiting for backend health... attempt $i/30"
            sleep 10
          done
          echo "Backend health check failed"
          exit 1
