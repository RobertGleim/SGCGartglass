<svg xmlns="http://www.w3.org/2000/svg" width="29" height="29" viewBox="0 0 60 78" overflow="hidden">
  <defs>
    <linearGradient id="bG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6ff"/>
      <stop offset="35%" style="stop-color:#29abff"/>
      <stop offset="70%" style="stop-color:#0072e5"/>
      <stop offset="100%" style="stop-color:#003fa3"/>
    </linearGradient>
    <linearGradient id="brG" x1="0%" y1="0%" x2="100%" y2="100%">
