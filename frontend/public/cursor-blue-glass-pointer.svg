      <stop offset="100%" style="stop-color:#002299"/>
    </linearGradient>
    <linearGradient id="hG" x1="0%" y1="0%" x2="40%" y2="80%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="sf" x="-30%" y="-30%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <clipPath id="hC">
      <path d="M 14,4 A 5,4 0 0 1 24,4 L 24,22 C 24,28 25,28 25,22 A 5,4 0 0 1 35,22 L 35,26 C 35,32 36,32 36,26 A 5,4 0 0 1 46,26 L 46,30 C 46,36 47,36 47,30 A 3.5,4 0 0 1 54,30 L 54,48 C 54,62 50,72 36,74 C 26,76 14,76 8,72 C 3,68 2,60 2,54 C 2,46 0,42 0,36 C 0,28 8,26 12,32 C 14,38 14,46 14,46 Z"/>
    </clipPath>
  </defs>

  <!-- Blurred shadow underneath -->
  <path d="M 14,4 A 5,4 0 0 1 24,4 L 24,22 C 24,28 25,28 25,22 A 5,4 0 0 1 35,22 L 35,26 C 35,32 36,32 36,26 A 5,4 0 0 1 46,26 L 46,30 C 46,36 47,36 47,30 A 3.5,4 0 0 1 54,30 L 54,48 C 54,62 50,72 36,74 C 26,76 14,76 8,72 C 3,68 2,60 2,54 C 2,46 0,42 0,36 C 0,28 8,26 12,32 C 14,38 14,46 14,46 Z"
