    <!-- Inner body -->
    <path d="M 16,4 A 3,3.5 0 0 1 22,4 L 22,22 C 22,27 23,27 23,22 A 3,3.5 0 0 1 33,22 L 33,26 C 33,31 34,31 34,26 A 3,3.5 0 0 1 44,26 L 44,30 C 44,35 45,35 45,30 A 2.5,3.5 0 0 1 52,30 L 52,48 C 52,60 49,68 36,70 C 27,72 16,72 10,69 C 6,66 5,59 5,54 C 5,47 3,43 3,37 C 3,31 9,29 12,34 C 13,39 15,45 16,46 Z"
