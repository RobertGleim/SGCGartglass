<svg xmlns="http://www.w3.org/2000/svg" width="29" height="29" viewBox="0 0 40 40" overflow="hidden">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6ff;stop-opacity:1"/>
      <stop offset="35%" style="stop-color:#29abff;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#0072e5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#003fa3;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60c8ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0033aa;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="highlightGrad" x1="0%" y1="0%" x2="80%" y2="80%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <clipPath id="arrowClip">
      <path d="M3,3 L3,28 L10,21 L15.5,33 L20,31 L14.5,19 L24,19 Z"/>
    </clipPath>
  </defs>

  <g clip-path="url(#arrowClip)">
    <!-- Outer border -->
    <path d="M3,3 L3,28 L10,21 L15.5,33 L20,31 L14.5,19 L24,19 Z"
          fill="url(#borderGrad)"/>

    <!-- Main body fill -->
    <path d="M4.5,4.5 L4.5,25.5 L10.5,19.5 L16,31.5 L19,30 L13.5,18 L22,18 Z"
          fill="url(#bodyGrad)"/>

    <!-- Glass highlight (top-left inner face) -->
    <path d="M4.5,4.5 L4.5,18 L11,11.5 L18,4.5 Z"
          fill="url(#highlightGrad)"/>

    <!-- Bright edge highlight along left -->
    <line x1="4.5" y1="4.5" x2="4.5" y2="25.5"
          stroke="white" stroke-width="1.2" stroke-opacity="0.7"/>

    <!-- Bright edge highlight along top -->
    <line x1="4.5" y1="4.5" x2="22" y2="18"
          stroke="white" stroke-width="0.8" stroke-opacity="0.5"/>

    <!-- Inner shine dot at tip -->
    <circle cx="5.5" cy="5.5" r="1.5" fill="white" opacity="0.9"/>
  </g>
</svg>
